<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="description" content="Japan's economy, made legible. Data, analysis and context for everyone. Open access.">
<meta property="og:title" content="Kotodama Finance">
<meta property="og:description" content="Where Japan's economic currents become visible — data, analysis and context for everyone.">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Zen+Kaku+Gothic+New:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0a1628;
    --ink-2: #0d1f3c;
    --gold: #c8a85a;
    --mist: #8aabcc;
    --line: rgba(200, 168, 90, 0.35);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { height: 100%; }

  body {
    background: linear-gradient(to bottom, #0a1c30 0%, #07172a 50%, #040d18 100%);
    background-attachment: fixed;
    color: var(--mist);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem 1.5rem;
    overflow: hidden;
    position: relative;
  }

  #sea { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 0; display: block; pointer-events: none; }
  .vignette { position: fixed; inset: 0; z-index: 1; pointer-events: none;
    background: radial-gradient(ellipse 62% 52% at 50% 45%, rgba(4,13,24,0.5) 0%, rgba(4,13,24,0.12) 48%, rgba(4,13,24,0) 75%); }


  /* Kanji del núcleo, marca de agua de fondo */
  .kanji-bg {
    position: fixed;
    inset: 0;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: clamp(1rem, 6vw, 5rem);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: clamp(4rem, 16vw, 13rem);
    color: var(--gold);
    opacity: 0.05;
    user-select: none;
    white-space: nowrap;
  }

  .content {
    position: relative;
    z-index: 2;
    max-width: 620px;
    display: flex;
    flex-direction: column;
    align-items: center;
    animation: rise 1.2s cubic-bezier(0.2, 0.7, 0.2, 1) both;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .mark {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: clamp(2.6rem, 9vw, 3.6rem);
    font-weight: 500;
    color: var(--gold);
    letter-spacing: 0.12em;
    line-height: 1;
    margin-bottom: 1.5rem;
  }

  .wordmark {
    font-family: 'Inter', sans-serif;
    font-size: clamp(0.95rem, 3.5vw, 1.15rem);
    font-weight: 500;
    letter-spacing: 0.42em;
    text-indent: 0.42em;
    color: var(--gold);
    margin-bottom: 2.2rem;
  }

  .rule {
    width: 64px;
    height: 1px;
    background: var(--line);
    margin: 0 auto 2.2rem;
  }

  .tagline {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.5rem, 5.5vw, 2.1rem);
    font-weight: 500;
    line-height: 1.3;
    color: #e7eef6;
    margin-bottom: 1.1rem;
  }

  .sub {
    font-size: clamp(0.9rem, 3vw, 1rem);
    font-weight: 400;
    line-height: 1.6;
    color: var(--mist);
    max-width: 30rem;
    margin-bottom: 2.6rem;
  }

  .status {
    display: inline-flex;
    align-items: center;
    gap: 0.55rem;
    font-size: 0.78rem;
    font-weight: 500;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 2.8rem;
  }
  .status .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--gold);
    animation: pulse 2.4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.35; transform: scale(0.7); }
  }

  .links {
    display: flex;
    gap: 0.9rem;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 2.4rem;
  }
  .links a {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.7rem 1.4rem;
    border: 1px solid var(--line);
    border-radius: 2px;
    color: #e7eef6;
    text-decoration: none;
    font-size: 0.9rem;
    font-weight: 500;
    letter-spacing: 0.02em;
    transition: border-color 0.25s ease, color 0.25s ease, background 0.25s ease;
  }
  .links a:hover,
  .links a:focus-visible {
    border-color: var(--gold);
    color: var(--gold);
    background: rgba(200, 168, 90, 0.06);
    outline: none;
  }
  .links svg { width: 16px; height: 16px; fill: currentColor; }

  .contact {
    font-size: 0.85rem;
    letter-spacing: 0.04em;
  }
  .contact a {
    color: var(--mist);
    text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: color 0.25s ease, border-color 0.25s ease;
  }
  .contact a:hover,
  .contact a:focus-visible {
    color: var(--gold);
    border-color: var(--line);
    outline: none;
  }

  @media (prefers-reduced-motion: reduce) {
    .currents .layer-1,
    .currents .layer-2,
    .currents .layer-3 { animation: none; }
    .content { animation: none; }
    .status .dot { animation: none; }
  }
</style>
</head>
<body>

  <canvas id="sea" aria-hidden="true"></canvas>
  <div class="vignette" aria-hidden="true"></div>


  <!-- Núcleo conceptual: 産霊 河川 言霊 -->
  <div class="kanji-bg" aria-hidden="true">産霊　河川　言霊</div>

  <main class="content">
    <div class="mark">言霊</div>
    <div class="wordmark">KOTODAMA FINANCE</div>
    <div class="rule"></div>
    <h1 class="tagline">Where Japan's economic currents become visible</h1>
    <p class="sub">Data, analysis and context for everyone. Open access.</p>

<script>
(function(){
  const c = document.getElementById('sea');
  const gl = c.getContext('webgl') || c.getContext('experimental-webgl');
  if(!gl){ c.style.display='none'; return; }
  const vs = `attribute vec2 p; void main(){ gl_Position=vec4(p,0.0,1.0); }`;
  const fs = `
    precision highp float;
    uniform vec2 u_res; uniform float u_time;
    uniform float u_speed;   // velocidad del viaje de las olas
    uniform float u_breath;  // respiracion del swell (independiente)

    // --- simplex noise 3D (Ashima / Stefan Gustavson) ---
    vec4 mod289(vec4 x){return x-floor(x*(1.0/289.0))*289.0;}
    vec3 mod289(vec3 x){return x-floor(x*(1.0/289.0))*289.0;}
    vec4 permute(vec4 x){return mod289(((x*34.0)+1.0)*x);}
    vec4 taylorInvSqrt(vec4 r){return 1.79284291400159-0.85373472095314*r;}
    float snoise(vec3 v){
      const vec2 C=vec2(1.0/6.0,1.0/3.0); const vec4 D=vec4(0.0,0.5,1.0,2.0);
      vec3 i=floor(v+dot(v,C.yyy)); vec3 x0=v-i+dot(i,C.xxx);
      vec3 g=step(x0.yzx,x0.xyz); vec3 l=1.0-g; vec3 i1=min(g.xyz,l.zxy); vec3 i2=max(g.xyz,l.zxy);
      vec3 x1=x0-i1+C.xxx; vec3 x2=x0-i2+C.yyy; vec3 x3=x0-D.yyy;
      i=mod289(i);
      vec4 pp=permute(permute(permute(i.z+vec4(0.0,i1.z,i2.z,1.0))+i.y+vec4(0.0,i1.y,i2.y,1.0))+i.x+vec4(0.0,i1.x,i2.x,1.0));
      float n_=0.142857142857; vec3 ns=n_*D.wyz-D.xzx;
      vec4 j=pp-49.0*floor(pp*ns.z*ns.z);
      vec4 x_=floor(j*ns.z); vec4 y_=floor(j-7.0*x_);
      vec4 x=x_*ns.x+ns.yyyy; vec4 y=y_*ns.x+ns.yyyy; vec4 h=1.0-abs(x)-abs(y);
      vec4 b0=vec4(x.xy,y.xy); vec4 b1=vec4(x.zw,y.zw);
      vec4 s0=floor(b0)*2.0+1.0; vec4 s1=floor(b1)*2.0+1.0; vec4 sh=-step(h,vec4(0.0));
      vec4 a0=b0.xzyw+s0.xzyw*sh.xxyy; vec4 a1=b1.xzyw+s1.xzyw*sh.zzww;
      vec3 p0=vec3(a0.xy,h.x); vec3 p1=vec3(a0.zw,h.y); vec3 p2=vec3(a1.xy,h.z); vec3 p3=vec3(a1.zw,h.w);
      vec4 norm=taylorInvSqrt(vec4(dot(p0,p0),dot(p1,p1),dot(p2,p2),dot(p3,p3)));
      p0*=norm.x; p1*=norm.y; p2*=norm.z; p3*=norm.w;
      vec4 m=max(0.6-vec4(dot(x0,x0),dot(x1,x1),dot(x2,x2),dot(x3,x3)),0.0); m=m*m;
      return 42.0*dot(m*m,vec4(dot(p0,x0),dot(p1,x1),dot(p2,x2),dot(p3,x3)));
    }

    // fbm 3D: el eje z es el TIEMPO => el campo EVOLUCIONA (no se traslada)
    float fbm(vec3 p){
      float s=0.0,a=0.55;
      for(int i=0;i<5;i++){ s+=a*snoise(p); p*=2.02; a*=0.5; }
      return s;
    }

    // Anisotropia: las olas se ESTIRAN perpendicular a la direccion de avance (olas alargadas = agua, no nubes)
    // matriz que comprime un eje y estira el otro, alineada a la diagonal del flujo
    vec2 anis(vec2 p){
      // rotar 45° (alinear con diagonal) y estirar: crestas largas cruzando la diagonal
      vec2 q = vec2(p.x+p.y, p.y-p.x)*0.7071;
      q.x *= 0.45;          // eje a lo largo de la cresta: comprimido => crestas largas
      q.y *= 1.55;          // eje perpendicular: estirado => surcos definidos
      return q;
    }

    // altura del oceano con escalas ANIDADAS (cada una monta sobre la anterior, siguiendo su pendiente)
    // y crestas redondeadas/asimetricas como el mar real (no ruido simetrico)
    float ocean(vec2 uvp, float t){
      vec2 V = normalize(vec2(1.0,-1.0));
      vec2 base = uvp + V * (u_time * u_speed);   // viaje diagonal

      // ESCALA 1 - swell: ondas grandes y suaves que forman la base. dan la pendiente general.
      float swell = fbm(vec3(base*0.7, u_time*u_breath)) * 2.0;
      vec2 slope = vec2(
        fbm(vec3(base*0.7+vec2(0.15,0.0), u_time*u_breath)) - swell/2.0,
        fbm(vec3(base*0.7+vec2(0.0,0.15), u_time*u_breath)) - swell/2.0
      );

      // ESCALA 2 - olas medianas: MONTAN sobre el swell (se desplazan segun su pendiente => anidadas)
      vec2 wp = anis(base*1.6 + slope*0.6);
      float wn = fbm(vec3(wp, u_time*u_breath*1.3));
      // cresta redondeada y ASIMETRICA: pow distinto segun signo => lomo suave / caida marcada
      float crest = wn>0.0 ? pow(wn, 0.7) : -pow(-wn, 1.5);
      float waves = crest * 2.1;

      // ESCALA 3 - rizado fino: monta sobre las olas medianas, sutil
      vec2 cp = anis(base*3.8 + slope*0.4);
      float ripple = fbm(vec3(cp, u_time*u_breath*1.8));
      ripple = ripple>0.0 ? pow(ripple,0.8) : -pow(-ripple,1.3);
      float chop = ripple * 0.30;

      return swell + waves + chop;
    }

    float oceanSmooth(vec2 uvp, float t){
      vec2 V = normalize(vec2(1.0,-1.0));
      vec2 base = uvp + V * (u_time * u_speed);
      float swell = fbm(vec3(base*0.7, u_time*u_breath)) * 2.0;
      vec2 slope = vec2(
        fbm(vec3(base*0.7+vec2(0.15,0.0), u_time*u_breath)) - swell/2.0,
        fbm(vec3(base*0.7+vec2(0.0,0.15), u_time*u_breath)) - swell/2.0
      );
      vec2 wp = anis(base*1.6 + slope*0.6);
      float wn = fbm(vec3(wp, u_time*u_breath*1.3));
      float crest = wn>0.0 ? pow(wn, 0.7) : -pow(-wn, 1.5);
      float waves = crest * 2.1;
      return swell + waves;
    }

    void main(){
      vec2 uv = gl_FragCoord.xy/u_res.xy;
      float aspect = u_res.x/u_res.y;
      vec2 p = vec2(uv.x*aspect, uv.y);
      float t = u_time * 0.09;                 // tiempo del oleaje

      // perspectiva de superficie: comprimido arriba (lejos), grande abajo (cerca)
      float persp = mix(1.5, 3.2, uv.y);
      vec2 sp = p*persp;

      float H = ocean(sp, t);

      // normal por derivadas (volumen / relieve de las olas)
      float e = 0.008*persp;   // epsilon: capta mas forma de la ola, sigue sin parpadeo (usa oceanSmooth)
      float hx = oceanSmooth(sp+vec2(e,0.0), t) - oceanSmooth(sp-vec2(e,0.0), t);
      float hy = oceanSmooth(sp+vec2(0.0,e), t) - oceanSmooth(sp-vec2(0.0,e), t);
      vec3 n = normalize(vec3(-hx*5.2, -hy*5.2, 0.13));

      // paleta navy mar oscuro
      vec3 deep  = vec3(0.001,0.009,0.024);
      vec3 mid   = vec3(0.024,0.075,0.130);
      vec3 crest = vec3(0.075,0.150,0.215);
      vec3 col = mix(deep, mid, smoothstep(-0.7,0.8,H));
      col = mix(col, crest, smoothstep(0.20,0.95,H)*0.85);
      col += uv.y*vec3(0.010,0.020,0.030);

      // Sin destellos: el relieve del oleaje viene del contraste de altura (swell que se hincha),
      // mas una sombra difusa MUY tenue por inclinacion, sin ningun brillo que distraiga.
      vec3 L = normalize(vec3(-0.35,0.65,0.6));
      float shade = dot(n, L) * 0.5 + 0.5;        // 0..1 suave
      col *= mix(0.62, 1.20, smoothstep(0.12, 0.94, shade));  // modula luz/sombra del propio color, sin agregar brillo

      gl_FragColor = vec4(col,1.0);
    }`;
  function sh(t,s){const o=gl.createShader(t);gl.shaderSource(o,s);gl.compileShader(o);
    if(!gl.getShaderParameter(o,gl.COMPILE_STATUS))console.error(gl.getShaderInfoLog(o));return o;}
  const pr=gl.createProgram();gl.attachShader(pr,sh(gl.VERTEX_SHADER,vs));gl.attachShader(pr,sh(gl.FRAGMENT_SHADER,fs));
  gl.linkProgram(pr);gl.useProgram(pr);
  const b=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,b);
  gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
  const lp=gl.getAttribLocation(pr,'p');gl.enableVertexAttribArray(lp);gl.vertexAttribPointer(lp,2,gl.FLOAT,false,0,0);
  const uR=gl.getUniformLocation(pr,'u_res'),uT=gl.getUniformLocation(pr,'u_time');
  const uSpeed=gl.getUniformLocation(pr,'u_speed'),uBreath=gl.getUniformLocation(pr,'u_breath');
  function rz(){const d=Math.min(devicePixelRatio||1,2);c.width=innerWidth*d|0;c.height=innerHeight*d|0;gl.viewport(0,0,c.width,c.height);}
  addEventListener('resize',rz);rz();
  const SPEED=0.040, BREATH=0.050;   // valores calibrados
  const s0=performance.now();
  (function f(now){
    gl.uniform2f(uR,c.width,c.height);gl.uniform1f(uT,(now-s0)*0.001);
    gl.uniform1f(uSpeed,SPEED);gl.uniform1f(uBreath,BREATH);
    gl.drawArrays(gl.TRIANGLE_STRIP,0,4);requestAnimationFrame(f);})(s0);
})();
</script>

</body>
