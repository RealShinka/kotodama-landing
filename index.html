<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kotodama Finance — Coming soon</title>
<meta name="description" content="Japan's economy, made legible. Data, analysis and context for everyone. Open access.">
<meta property="og:title" content="Kotodama Finance">
<meta property="og:description" content="Where Japan's economic currents become visible — data, analysis and context for everyone.">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Zen+Kaku+Gothic+New:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0a1628;
    --ink-2: #0d1f3c;
    --gold: #c8a85a;
    --mist: #8aabcc;
    --line: rgba(200, 168, 90, 0.35);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { height: 100%; }

  body {
    background: var(--ink);
    color: var(--mist);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem 1.5rem;
    overflow: hidden;
    position: relative;
  }

  /* Corrientes de agua — Kasen, sutil, de fondo */
  .currents {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    opacity: 0.5;
  }
  .currents path {
    fill: none;
    stroke: var(--ink-2);
    stroke-width: 1.2;
  }
  .currents path.c2 { stroke: #112748; }
  .currents path.c3 { stroke: #0f2342; }

  @keyframes drift {
    from { transform: translateX(0); }
    to   { transform: translateX(-120px); }
  }
  .currents .layer-1 { animation: drift 28s linear infinite; }
  .currents .layer-2 { animation: drift 40s linear infinite; }
  .currents .layer-3 { animation: drift 54s linear infinite; }

  /* Kanji del núcleo, marca de agua de fondo */
  .kanji-bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: clamp(1rem, 6vw, 5rem);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: clamp(4rem, 16vw, 13rem);
    color: var(--gold);
    opacity: 0.05;
    user-select: none;
    white-space: nowrap;
  }

  .content {
    position: relative;
    z-index: 2;
    max-width: 620px;
    display: flex;
    flex-direction: column;
    align-items: center;
    animation: rise 1.2s cubic-bezier(0.2, 0.7, 0.2, 1) both;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .mark {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: clamp(2.6rem, 9vw, 3.6rem);
    font-weight: 500;
    color: var(--gold);
    letter-spacing: 0.12em;
    line-height: 1;
    margin-bottom: 1.5rem;
  }

  .wordmark {
    font-family: 'Inter', sans-serif;
    font-size: clamp(0.95rem, 3.5vw, 1.15rem);
    font-weight: 500;
    letter-spacing: 0.42em;
    text-indent: 0.42em;
    color: var(--gold);
    margin-bottom: 2.2rem;
  }

  .rule {
    width: 64px;
    height: 1px;
    background: var(--line);
    margin: 0 auto 2.2rem;
  }

  .tagline {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.5rem, 5.5vw, 2.1rem);
    font-weight: 500;
    line-height: 1.3;
    color: #e7eef6;
    margin-bottom: 1.1rem;
  }

  .sub {
    font-size: clamp(0.9rem, 3vw, 1rem);
    font-weight: 400;
    line-height: 1.6;
    color: var(--mist);
    max-width: 30rem;
    margin-bottom: 2.6rem;
  }

  .status {
    display: inline-flex;
    align-items: center;
    gap: 0.55rem;
    font-size: 0.78rem;
    font-weight: 500;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 2.8rem;
  }
  .status .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--gold);
    animation: pulse 2.4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.35; transform: scale(0.7); }
  }

  .links {
    display: flex;
    gap: 0.9rem;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 2.4rem;
  }
  .links a {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.7rem 1.4rem;
    border: 1px solid var(--line);
    border-radius: 2px;
    color: #e7eef6;
    text-decoration: none;
    font-size: 0.9rem;
    font-weight: 500;
    letter-spacing: 0.02em;
    transition: border-color 0.25s ease, color 0.25s ease, background 0.25s ease;
  }
  .links a:hover,
  .links a:focus-visible {
    border-color: var(--gold);
    color: var(--gold);
    background: rgba(200, 168, 90, 0.06);
    outline: none;
  }
  .links svg { width: 16px; height: 16px; fill: currentColor; }

  .contact {
    font-size: 0.85rem;
    letter-spacing: 0.04em;
  }
  .contact a {
    color: var(--mist);
    text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: color 0.25s ease, border-color 0.25s ease;
  }
  .contact a:hover,
  .contact a:focus-visible {
    color: var(--gold);
    border-color: var(--line);
    outline: none;
  }

  @media (prefers-reduced-motion: reduce) {
    .currents .layer-1,
    .currents .layer-2,
    .currents .layer-3 { animation: none; }
    .content { animation: none; }
    .status .dot { animation: none; }
  }
</style>
</head>
<body>

  <!-- Kasen: corrientes de fondo -->
  <svg class="currents" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
    <g class="layer-1">
      <path d="M-200 300 Q 100 270 400 300 T 1000 300 T 1640 300" />
      <path d="M-200 320 Q 100 290 400 320 T 1000 320 T 1640 320" />
    </g>
    <g class="layer-2">
      <path class="c2" d="M-200 480 Q 160 445 520 480 T 1240 480 T 1760 480" />
      <path class="c2" d="M-200 505 Q 160 470 520 505 T 1240 505 T 1760 505" />
    </g>
    <g class="layer-3">
      <path class="c3" d="M-200 650 Q 200 615 600 650 T 1400 650 T 1960 650" />
      <path class="c3" d="M-200 675 Q 200 640 600 675 T 1400 675 T 1960 675" />
    </g>
  </svg>

  <!-- Núcleo conceptual: 産霊 河川 言霊 -->
  <div class="kanji-bg" aria-hidden="true">産霊　河川　言霊</div>

  <main class="content">
    <div class="mark">言霊</div>
    <div class="wordmark">KOTODAMA FINANCE</div>
    <div class="rule"></div>
    <h1 class="tagline">Where Japan's economic currents become visible</h1>
    <p class="sub">Data, analysis and context for everyone. Open access.</p>

    <div class="status"><span class="dot"></span>Coming soon</div>

    <nav class="links" aria-label="Social links">
      <a href="https://x.com/KotodamaFinance" target="_blank" rel="noopener">

        Follow on X
      </a>
      <a href="https://www.linkedin.com/company/kotodamafinance" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
        Connect on LinkedIn
      </a>
    </nav>

    <p class="contact"><a href="mailto:contact@kotodamafinance.com">contact@kotodamafinance.com</a></p>
  </main>

</body>
</html>
